plugin: community.proxmox.proxmox
url: https://192.168.50.107:8006
user: terraform@pve
token_id: provider
token_secret: "{{ lookup('env', 'PROXMOX_TOKEN') }}"
validate_certs: false
want_facts: true
compose:
  ansible_host: >-
    proxmox_agent_interfaces
    | rejectattr('name', 'equalto', 'lo')
    | rejectattr('name', 'equalto', 'tailscale0')
    | map(attribute='ip-addresses')
    | first | first | split('/') | first
keyed_groups:
  - prefix: ""
    separator: ""
    key: proxmox_tags_parsed
vars:
  ansible_user: ansible
  ansible_ssh_private_key_file: ~/.ssh/id_ed25519_ansible
