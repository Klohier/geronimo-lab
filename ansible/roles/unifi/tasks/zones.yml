- name: Get existing zones
  ubiquiti.unifi_api.network:
    path: "/v1/sites/{{ unifi_site_id }}/firewall/zones"
    method: GET
  register: existing_zones

- name: Set zone ID facts
  set_fact:
    "zone_{{ item.key }}": "{{ existing_zones.data.data | selectattr('name', 'equalto', item.value) | map(attribute='id') | first }}"
  loop: "{{ unifi_zone_names | dict2items }}"
