- name: restart caddy
  containers.podman.podman_container:
    name: caddy
    state: started
    restart_policy: always
    force_restart: true
    image: registry.redhat.io/hi/caddy:latest
    ports:
      - "80:8080"
      - "443:8443"
    volumes:
      - /var/caddy/Caddyfile:/etc/caddy/Caddyfile:ro,Z
      - /var/caddy/data:/data:Z
      - /var/caddy/config:/config:Z
